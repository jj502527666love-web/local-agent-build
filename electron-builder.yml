appId: com.local-agent.app
productName: LocalAgent
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.node.tsbuildinfo}'
  # Backend (Laravel + React admin) is deployed separately to agent-admin.o455.com — do NOT bundle
  - '!agent-admin/**/*'
  # Dev-only loose files at repo root
  - '!find_pptmaster.py'
  - '!progress.txt'
  - '!*.md'
  # better-sqlite3 build debug artifacts (~30MB) — only the .node binary is needed at runtime
  - '!node_modules/better-sqlite3/build/Release/obj/**/*'
  - '!node_modules/better-sqlite3/build/Release/*.{iobj,ipdb,lib,exp,pdb}'
  - '!node_modules/better-sqlite3/build/Release/test_extension.node'
  - '!node_modules/better-sqlite3/deps/**/*'
  - '!node_modules/better-sqlite3/src/**/*'
  - '!node_modules/better-sqlite3/docs/**/*'
  - '!node_modules/better-sqlite3/benchmark/**/*'
  # Source maps from runtime deps (~10MB combined)
  - '!**/*.map'
electronLanguages:
  - en-US
  - zh-CN
icon: build/icon.png
win:
  executableName: LocalAgent
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: LocalAgent
  uninstallDisplayName: LocalAgent
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
mac:
  executableName: LocalAgent
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: generic
  url: https://agent-up.o455.com/releases/
extraResources:
  - from: './resources/'
    to: './'
  - from: './build/icon.png'
    to: './icon.png'
