appId: com.local-agent.app
productName: LocalAgent
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.node.tsbuildinfo,tsconfig.web.tsbuildinfo}'
  # Backend (Laravel + React admin) is deployed separately to agent-admin.o455.com — do NOT bundle
  - '!agent-admin/**/*'
  # Build dispatcher (Laravel) — independent service; never runtime-needed by the desktop app
  - '!agent-build/**/*'
  # CI-side temporary build icons generated by inject-build-params.js (one png per dispatch)
  - '!.build-icons/**/*'
  # IDE / agent workspaces and unrelated demo assets — local-only artifacts
  - '!.windsurf/**/*'
  - '!.github/**/*'
  # Dev-only loose files at repo root
  - '!find_pptmaster.py'
  - '!progress.txt'
  - '!_dev.bat'
  - '!*.md'
  # better-sqlite3 build debug artifacts (~30MB) — only the .node binary is needed at runtime
  - '!node_modules/better-sqlite3/build/Release/obj/**/*'
  - '!node_modules/better-sqlite3/build/Release/*.{iobj,ipdb,lib,exp,pdb}'
  - '!node_modules/better-sqlite3/build/Release/test_extension.node'
  - '!node_modules/better-sqlite3/deps/**/*'
  - '!node_modules/better-sqlite3/src/**/*'
  - '!node_modules/better-sqlite3/docs/**/*'
  - '!node_modules/better-sqlite3/benchmark/**/*'
  - '!**/__pycache__/**/*'
  - '!**/*.pyc'
  - '!**/*.pyo'
  # Source maps + TypeScript declaration files (runtime not needed)
  - '!**/*.map'
  - '!**/*.d.ts'
  - '!**/*.d.mts'
  - '!**/*.d.cts'
  # CI build-time caches written to workspace by build-{win,mac}.yml
  # (ELECTRON_CACHE / ELECTRON_BUILDER_CACHE = ${{ github.workspace }}/.cache/...).
  # Without this exclude, the ~110MB electron prebuilt zip leaks into app.asar
  # and inflates the installer by the same amount.
  - '!.cache/**/*'
  # Chromium 三方许可 HTML（~9.5MB）。运行时不读，仅用于法律披露；
  # 如果分发要求合规可以单独存档，无需打入安装包。
  - '!**/LICENSES.chromium.html'
# sqlite-vec 原生扩展(vec0.dll/.so/.dylib)+ 原生 .node 模块必须解包到 asar 外，
# 否则 loadExtension 无法按文件路径加载(运行时会回退 JS cosine，解包后才能真正启用 KNN 加速)。
asarUnpack:
  - '**/node_modules/sqlite-vec*/**'
  - '**/*.node'
electronLanguages:
  - en-US
  - zh-CN
icon: build/icon.png
win:
  executableName: LocalAgent
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: LocalAgent
  uninstallDisplayName: LocalAgent
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
mac:
  executableName: LocalAgent
  # 只打 zip：
  # 1. electron-updater 在 mac 上只认 zip 作为 auto-update 载体
  # 2. 未签名场景下 dmg 的"图形化挂载体验"会被 Gatekeeper 拦截抵消，相比 zip 无优势
  # 3. hdiutil 在 macos-latest (Apple Silicon) runner 上高频抽风，dmg 构建不稳定
  # 4. 跳过 hdiutil 后构建耗时降低 ~40%、磁盘压力减半
  #
  # artifactName 必须强制 ASCII：
  # ${productName} 默认包含 APP_NAME（白标可能含中文），中文 filename 会让
  # cos 上传/PHP HEAD 时编码不一致 → callback HEAD 校验找不到对象 → HTTP 422 cos_object_missing
  # 用 ${name}（package.json.name = inject-build-params 强制 ASCII 小写）规避
  artifactName: ${name}-${version}-${arch}-mac.${ext}
  target:
    - target: zip
      arch:
        - x64
        - arm64
publish:
  provider: generic
  url: https://agent-up.o455.com/releases/
extraResources:
  - from: './resources/'
    to: './'
    filter:
      - '**/*'
      - '!**/__pycache__/**/*'
      - '!**/*.pyc'
      - '!**/*.pyo'
  - from: './build/icon.png'
    to: './icon.png'
