name: Cloud Build (Windows)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build UUID issued by agent-build'
        required: true
        type: string
      app_name:
        description: 'Display name of the white-labeled app'
        required: true
        type: string
      domain:
        description: 'Tenant domain (with scheme, e.g. https://a.com)'
        required: true
        type: string
      api_domain:
        description: 'API domain for the desktop runtime (with scheme)'
        required: true
        type: string
      icon_path:
        description: 'Repo-relative path to the icon PNG (pre-uploaded by agent-build)'
        required: true
        type: string
      callback_url:
        description: 'agent-build callback endpoint'
        required: true
        type: string
      callback_token:
        description: 'One-time bearer token for callback'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    # Electron 缓存路径：让 electron-builder 把 electron 运行时与 builder 缓存写到 workspace 下，
    # 配合 actions/cache 跨 run 复用，避免每次 build 重复下载 80MB+ electron 二进制。
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Inject build parameters
        run: node scripts/inject-build-params.js
        env:
          BUILD_ID: ${{ inputs.build_id }}
          APP_NAME: ${{ inputs.app_name }}
          DOMAIN: ${{ inputs.domain }}
          API_DOMAIN: ${{ inputs.api_domain }}
          ICON_LOCAL_PATH: ${{ inputs.icon_path }}
          PLATFORM: win

      - name: Build & Package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Stage artifacts and compute metadata
        id: files
        shell: bash
        working-directory: ./dist
        run: |
          PRIMARY_EXT=".exe"
          mkdir -p ../cos-upload
          files_json="["
          first=true
          for f in *; do
            [ -f "$f" ] || continue
            role=""
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              *"$PRIMARY_EXT") role="primary" ;;
              *.blockmap)      role="blockmap" ;;
              latest*.yml)     role="metadata" ;;
              *) continue ;;
            esac
            cp "$f" ../cos-upload/
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            sha=$(sha256sum "$f" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$f" | awk '{print $1}')
            [ "$first" = true ] && first=false || files_json="$files_json,"
            files_json="$files_json{\"filename\":\"$f\",\"size\":$size,\"sha256\":\"$sha\",\"role\":\"$role\"}"
          done
          files_json="$files_json]"
          echo "files=$files_json" >> "$GITHUB_OUTPUT"
          echo "Generated metadata: $files_json"
          echo "--- Staged files in ./cos-upload ---"
          ls -la ../cos-upload/

      - name: Upload artifacts to Tencent COS (S3 protocol)
        # 用 aws-cli + COS S3 兼容协议取代 coscmd：aws-cli 是预装二进制（不需 pip），
        # 重试/超时/分片参数都是产品级实现，跨境网络下稳定性明显优于 coscmd。
        # Step 级 30 分钟兜底 + 内部 3 次重试（间隔 30s）吃掉偏发抖动。
        timeout-minutes: 30
        shell: bash
        env:
          # 禁用 Git Bash (MSYS) 路径转换，避免 s3:// URI 被改写
          MSYS_NO_PATHCONV: '1'
          MSYS2_ARG_CONV_EXCL: '*'
          # COS S3 兼容协议复用 aws-cli，凭证按 AWS_* 名字注入即可
          AWS_ACCESS_KEY_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          # aws-cli 必填 region，COS 不用但要给个值
          AWS_DEFAULT_REGION: us-east-1
          # aws-cli v2.23+ 默认发 x-amz-checksum-* header，COS 兼容不完美，关掉免却 SignatureDoesNotMatch
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          ENDPOINT="https://cos.${COS_REGION}.myqcloud.com"
          S3_URI="s3://${COS_BUCKET}/build-artifacts/${BUILD_ID}/"

          echo "=== aws-cli version ==="
          aws --version
          echo ""
          echo "=== Validate required env (length-only) ==="
          echo "ACCESS_KEY length: ${#AWS_ACCESS_KEY_ID}"
          echo "SECRET_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "BUCKET: $COS_BUCKET"
          echo "REGION: $COS_REGION"
          echo "ENDPOINT: $ENDPOINT"
          test -n "$AWS_ACCESS_KEY_ID" || { echo "ERROR: TENCENT_COS_SECRET_ID is empty"; exit 1; }
          test -n "$AWS_SECRET_ACCESS_KEY" || { echo "ERROR: TENCENT_COS_SECRET_KEY is empty"; exit 1; }
          test -n "$COS_BUCKET" || { echo "ERROR: TENCENT_COS_BUCKET is empty"; exit 1; }
          test -n "$COS_REGION" || { echo "ERROR: TENCENT_COS_REGION is empty"; exit 1; }

          echo ""
          echo "=== Tune aws-cli s3 transfer params (serial + small chunks for cross-border) ==="
          # 这几个参数只能从 ~/.aws/config 读，用 env 设不上，须 aws configure set
          aws configure set default.s3.max_concurrent_requests 1
          aws configure set default.s3.multipart_chunksize 10MB
          aws configure set default.s3.multipart_threshold 50MB
          aws configure set default.s3.max_bandwidth 100MB/s

          echo ""
          echo "=== Probe: cross-border latency to COS endpoint ==="
          curl -o /dev/null -s -w "  dns=%{time_namelookup}s connect=%{time_connect}s ttfb=%{time_starttransfer}s total=%{time_total}s\n" \
            "$ENDPOINT/$COS_BUCKET" || echo "  (probe curl failed, continuing)"

          echo ""
          echo "=== Probe: 1MB upload speed test ==="
          # 走相对路径避免 Win Git Bash 下 /tmp 被 MSYS 转换后 aws-cli 找不到
          dd if=/dev/urandom of=./_speed_1mb.bin bs=1048576 count=1 2>/dev/null
          time aws --endpoint-url "$ENDPOINT" s3 cp ./_speed_1mb.bin \
            "s3://${COS_BUCKET}/build-artifacts/_speedtest/${BUILD_ID}.bin" \
            --no-progress || echo "  (speed test failed, continuing)"
          rm -f ./_speed_1mb.bin

          echo ""
          echo "=== List bucket root (verify credentials + endpoint) ==="
          aws --endpoint-url "$ENDPOINT" s3 ls "s3://${COS_BUCKET}/" --human-readable | head -20 \
            || { echo "!!! bucket access failed; credentials/permissions/endpoint wrong"; exit 1; }

          echo ""
          echo "=== Upload ./cos-upload/ to $S3_URI (3 attempts, 30s backoff) ==="
          n=0
          until [ $n -ge 3 ]; do
            n=$((n+1))
            echo "--- attempt $n/3 ---"
            if aws --endpoint-url "$ENDPOINT" s3 cp ./cos-upload/ "$S3_URI" \
                --recursive \
                --no-progress \
                --cli-read-timeout 60 \
                --cli-connect-timeout 30; then
              echo "--- attempt $n succeeded ---"
              break
            fi
            echo "--- attempt $n failed ---"
            if [ $n -lt 3 ]; then
              echo "sleep 30s before retry..."
              sleep 30
            fi
          done
          [ $n -lt 3 ] && true || { echo "!!! all 3 upload attempts failed"; exit 1; }

          echo ""
          echo "=== Verify uploaded objects ==="
          aws --endpoint-url "$ENDPOINT" s3 ls "$S3_URI" --human-readable

      - name: Notify agent-build (success)
        if: success()
        shell: bash
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "build_id": "${{ inputs.build_id }}",
            "run_id": ${{ github.run_id }},
            "status": "success",
            "artifact_storage": "cos",
            "cos_object_prefix": "build-artifacts/${{ inputs.build_id }}/",
            "files": ${{ steps.files.outputs.files }}
          }
          EOF
          )"

      - name: Notify agent-build (failure)
        if: failure()
        shell: bash
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "{\"build_id\":\"${{ inputs.build_id }}\",\"run_id\":${{ github.run_id }},\"status\":\"failed\"}"

      - name: Cleanup temp icon from repo
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ICON_SHA=$(gh api repos/${{ github.repository }}/contents/${{ inputs.icon_path }} --jq '.sha' 2>/dev/null || true)
          if [ -n "$ICON_SHA" ]; then
            gh api --method DELETE repos/${{ github.repository }}/contents/${{ inputs.icon_path }} \
              -f message="chore: cleanup build icon ${{ inputs.build_id }}" \
              -f sha="$ICON_SHA" \
              -f branch="${{ github.ref_name }}" || true
          fi
