name: Cloud Build (macOS)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build UUID issued by agent-build'
        required: true
        type: string
      app_name:
        description: 'Display name of the white-labeled app'
        required: true
        type: string
      domain:
        description: 'Tenant domain (with scheme, e.g. https://a.com)'
        required: true
        type: string
      api_domain:
        description: 'API domain for the desktop runtime (with scheme)'
        required: true
        type: string
      icon_path:
        description: 'Repo-relative path to the icon PNG (pre-uploaded by agent-build)'
        required: true
        type: string
      callback_url:
        description: 'agent-build callback endpoint'
        required: true
        type: string
      callback_token:
        description: 'One-time bearer token for callback'
        required: true
        type: string

permissions:
  # 0.5.0：softprops/action-gh-release@v2 创建 release 需要 contents:write；
  # 默认 GITHUB_TOKEN 在 2023+ 创建的 repo 是 read-only，必须显式声明。
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Electron 缓存路径：写到 runner.temp（GHA runner 的临时目录），不在 github.workspace 内。
      # 关键原因：electron-builder 默认 files 规则会把 workspace 内未被 ! 排除的内容打进 app.asar，
      # 之前用 ${{ github.workspace }}/.cache/electron 时，~110MB 的 electron prebuilt zip
      # 被泄漏到 app.asar 里。改到 runner.temp 后从根因杜绝（builder 看不到这个路径）。
      #
      # 用 step 写 $GITHUB_ENV 而不是 job-level env: 是因为 GHA 的 ${{ runner.temp }} 在
      # job-level env 评估阶段尚未可用（runner 信息在 job 调度时才确定），那么写 lint 报错。
      # $RUNNER_TEMP 是 runner 启动时注入的 shell 环境变量，shell 内可直接使用。
      - name: Configure Electron cache paths (out of workspace)
        shell: bash
        run: |
          echo "ELECTRON_CACHE=$RUNNER_TEMP/electron-cache" >> "$GITHUB_ENV"
          echo "ELECTRON_BUILDER_CACHE=$RUNNER_TEMP/electron-builder-cache" >> "$GITHUB_ENV"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # 不再需要 Setup Python：原本是为装 coscmd (Python 包) 避开 macOS 系统 Python 的 PEP 668。
      # 现在换成 aws-cli (预装二进制)，Python 依赖全部去掉。

      - name: Install dependencies
        run: npm ci

      - name: Inject build parameters
        run: node scripts/inject-build-params.js
        env:
          BUILD_ID: ${{ inputs.build_id }}
          APP_NAME: ${{ inputs.app_name }}
          DOMAIN: ${{ inputs.domain }}
          API_DOMAIN: ${{ inputs.api_domain }}
          ICON_LOCAL_PATH: ${{ inputs.icon_path }}
          PLATFORM: mac

      - name: Build & Package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 包体积预算自检：mac 出 zip（双架构 x64/arm64），各自校验。
      # 阈值 130MB（mac zip 基线略高于 win nsis）。超阈值通过 ::warning:: 上 GHA Annotation。
      - name: Validate installer size budget
        shell: bash
        working-directory: ./dist
        run: |
          set -uo pipefail
          SIZE_BUDGET_MB=130
          OVER=0
          for ZIP in *.zip; do
            [ -f "$ZIP" ] || continue
            SIZE_BYTES=$(stat -f%z "$ZIP" 2>/dev/null || stat -c%s "$ZIP")
            SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
            echo "Installer: $ZIP = ${SIZE_MB} MB (budget ${SIZE_BUDGET_MB} MB)"
            if [ "$SIZE_MB" -gt "$SIZE_BUDGET_MB" ]; then
              echo "::warning::Installer ${ZIP} is ${SIZE_MB}MB, exceeds budget ${SIZE_BUDGET_MB}MB."
              OVER=$(( OVER + 1 ))
            fi
          done
          if [ "$OVER" -gt 0 ]; then
            ASAR=$(find . -path '*mac*/*.app/Contents/Resources/app.asar' 2>/dev/null | head -n1 || true)
            if [ -n "$ASAR" ]; then
              echo "=== Top 200 entries inside app.asar (first arch) ==="
              npx --yes @electron/asar list "$ASAR" 2>/dev/null | head -200 || true
            fi
          fi

      - name: Stage artifacts and compute metadata
        id: files
        shell: bash
        working-directory: ./dist
        run: |
          set -uo pipefail
          echo "=== dist contents ==="
          ls -la

          # mac 只打 zip（见 electron-builder.yml mac.target 注释），primary 后缀固定为 .zip
          # 三件套：*.zip (primary) + *.zip.blockmap (blockmap) + latest-mac.yml (metadata)
          mkdir -p ../release-upload
          files_json="["
          first=true
          have_primary=false
          for f in *; do
            [ -f "$f" ] || continue
            role=""
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              *.blockmap)
                role="blockmap"
                ;;
              latest*.yml)
                role="metadata"
                ;;
              *.zip)
                role="primary"
                have_primary=true
                ;;
              *) continue ;;
            esac
            cp "$f" ../release-upload/
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            sha=$(sha256sum "$f" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$f" | awk '{print $1}')
            [ "$first" = true ] && first=false || files_json="$files_json,"
            files_json="$files_json{\"filename\":\"$f\",\"size\":$size,\"sha256\":\"$sha\",\"role\":\"$role\"}"
          done
          files_json="$files_json]"

          # 防御性校验：build step 已经成功才会到这里，正常情况一定有 zip 产出；
          # 如果没有说明 electron-builder 行为意外变化，显式失败方便排查。
          if [ "$have_primary" != "true" ]; then
            echo "ERROR: no .zip artifact produced — electron-builder behavior unexpected"
            exit 1
          fi

          echo "files=$files_json" >> "$GITHUB_OUTPUT"
          echo "Generated metadata: $files_json"
          echo "--- Staged files in ./release-upload ---"
          ls -la ../release-upload/

      - name: Upload artifacts to GitHub Release
        id: release
        # 0.5.0：放弃跨境 COS 直传。GHA 的产物上传到 GitHub Release（同 GitHub 基础设施，
        # 0 跨境）→ 家庭电脑用梯子拉 + 内网 SFTP 推到本地服务器 → agent-admin 拉国内
        # mirror URL。Release tag 必为 "build-{build_id}"，agent-build callback 会校验该 tag。
        # prerelease=true 让 release 不显眼但公网可访问；make_latest=false 不动 repo
        # 默认 latest release。家庭电脑成功 mirror 后会主动删 release 释放 GitHub 存储。
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.build_id }}
          name: "Build ${{ inputs.app_name }} (${{ inputs.build_id }}) [mac]"
          prerelease: true
          make_latest: 'false'
          target_commitish: ${{ github.sha }}
          files: release-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enrich file metadata with GitHub Release asset URLs
        id: enrich_files
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ID: ${{ inputs.build_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 拉刚创建的 release 的所有 asset（含 id 和 GitHub API 下载 URL）。
          # gh CLI v2 的 release view --json assets 输出每个 asset 的 id/name/apiUrl/url/size。
          # 家庭电脑要用 Authorization Bearer 拉，所以传给 callback 的 asset_url 用 apiUrl
          # （形如 https://api.github.com/repos/{owner}/{repo}/releases/assets/{id}）。
          assets=$(gh release view "build-${BUILD_ID}" --repo "$REPO" --json assets --jq '.assets')

          # 把 stage step 输出的 files（含 size/sha256/role）跟 assets（含 id/apiUrl）按 name 拼接。
          files='${{ steps.files.outputs.files }}'
          # 注意：gh CLI `--json assets` 里 .id 是 GraphQL node_id 字符串（如 "RA_kw..."），
          # 不是 REST API 的数字 id。从 apiUrl 末尾正则提取数字 id 才是 REST 通用形式。
          # 例：https://api.github.com/.../releases/assets/416817002 → 416817002
          merged=$(jq -nc \
            --argjson files "$files" \
            --argjson assets "$assets" \
            '[ $files[] as $f | ($assets[] | select(.name == $f.filename)) as $a |
               $f + {
                 asset_id: ($a.apiUrl | capture("/assets/(?<id>[0-9]+)$") | .id | tonumber),
                 asset_url: $a.apiUrl
               } ]')

          # 校验：合并后条数应等于 files 条数，否则 release 上传缺文件。
          files_count=$(jq 'length' <<< "$files")
          merged_count=$(jq 'length' <<< "$merged")
          if [ "$files_count" -ne "$merged_count" ]; then
            echo "ERROR: file/asset count mismatch (files=$files_count, merged=$merged_count)"
            echo "files=$files"
            echo "assets=$assets"
            exit 1
          fi

          echo "files=$merged" >> "$GITHUB_OUTPUT"
          echo "Enriched files: $merged"

      - name: Notify agent-build (success)
        if: success()
        shell: bash
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "build_id": "${{ inputs.build_id }}",
            "run_id": ${{ github.run_id }},
            "status": "success",
            "artifact_storage": "github_release",
            "release_tag": "build-${{ inputs.build_id }}",
            "files": ${{ steps.enrich_files.outputs.files }}
          }
          EOF
          )"

      - name: Notify agent-build (failure)
        if: failure()
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "{\"build_id\":\"${{ inputs.build_id }}\",\"run_id\":${{ github.run_id }},\"status\":\"failed\"}"

      - name: Cleanup partial GitHub Release on failure
        # GHA 失败时也可能已创建部分 release（如 softprops upload 中途 abort）。
        # 这里无条件尝试删一次，release 不存在则全部 || true 吞下，避免 GitHub 存储泄漏。
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ID: ${{ inputs.build_id }}
          REPO: ${{ github.repository }}
        run: |
          gh release delete "build-${BUILD_ID}" --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true

      - name: Cleanup temp icon from repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ICON_SHA=$(gh api repos/${{ github.repository }}/contents/${{ inputs.icon_path }} --jq '.sha' 2>/dev/null || true)
          if [ -n "$ICON_SHA" ]; then
            gh api --method DELETE repos/${{ github.repository }}/contents/${{ inputs.icon_path }} \
              -f message="chore: cleanup build icon ${{ inputs.build_id }}" \
              -f sha="$ICON_SHA" \
              -f branch="${{ github.ref_name }}" || true
          fi
