name: Cloud Build (macOS)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build UUID issued by agent-build'
        required: true
        type: string
      app_name:
        description: 'Display name of the white-labeled app'
        required: true
        type: string
      domain:
        description: 'Tenant domain (with scheme, e.g. https://a.com)'
        required: true
        type: string
      api_domain:
        description: 'API domain for the desktop runtime (with scheme)'
        required: true
        type: string
      icon_path:
        description: 'Repo-relative path to the icon PNG (pre-uploaded by agent-build)'
        required: true
        type: string
      callback_url:
        description: 'agent-build callback endpoint'
        required: true
        type: string
      callback_token:
        description: 'One-time bearer token for callback'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # macos-latest 现在是基于 Apple Silicon 的 macos-14，默认 Python 是 Homebrew 管的，
      # 会触发 PEP 668 "externally-managed-environment" 报错。装个独立 Python 避开这个问题，
      # 后面 coscmd 的 pip install 会走这个独立环境。
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Inject build parameters
        run: node scripts/inject-build-params.js
        env:
          BUILD_ID: ${{ inputs.build_id }}
          APP_NAME: ${{ inputs.app_name }}
          DOMAIN: ${{ inputs.domain }}
          API_DOMAIN: ${{ inputs.api_domain }}
          ICON_LOCAL_PATH: ${{ inputs.icon_path }}
          PLATFORM: mac

      - name: Build & Package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Stage artifacts and compute metadata
        id: files
        shell: bash
        working-directory: ./dist
        run: |
          set -uo pipefail
          echo "=== dist contents ==="
          ls -la

          # mac 只打 zip（见 electron-builder.yml mac.target 注释），primary 后缀固定为 .zip
          # 三件套：*.zip (primary) + *.zip.blockmap (blockmap) + latest-mac.yml (metadata)
          mkdir -p ../cos-upload
          files_json="["
          first=true
          have_primary=false
          for f in *; do
            [ -f "$f" ] || continue
            role=""
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              *.blockmap)
                role="blockmap"
                ;;
              latest*.yml)
                role="metadata"
                ;;
              *.zip)
                role="primary"
                have_primary=true
                ;;
              *) continue ;;
            esac
            cp "$f" ../cos-upload/
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            sha=$(sha256sum "$f" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$f" | awk '{print $1}')
            [ "$first" = true ] && first=false || files_json="$files_json,"
            files_json="$files_json{\"filename\":\"$f\",\"size\":$size,\"sha256\":\"$sha\",\"role\":\"$role\"}"
          done
          files_json="$files_json]"

          # 防御性校验：build step 已经成功才会到这里，正常情况一定有 zip 产出；
          # 如果没有说明 electron-builder 行为意外变化，显式失败方便排查。
          if [ "$have_primary" != "true" ]; then
            echo "ERROR: no .zip artifact produced — electron-builder behavior unexpected"
            exit 1
          fi

          echo "files=$files_json" >> "$GITHUB_OUTPUT"
          echo "Generated metadata: $files_json"
          echo "--- Staged files in ./cos-upload ---"
          ls -la ../cos-upload/

      - name: Upload artifacts to Tencent COS (coscmd)
        shell: bash
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          echo "=== Install coscmd ==="
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet coscmd
          coscmd --version
          echo ""
          echo "=== Validate required env (length-only, values masked) ==="
          echo "SECRET_ID length: ${#COS_SECRET_ID}"
          echo "SECRET_KEY length: ${#COS_SECRET_KEY}"
          echo "BUCKET: $COS_BUCKET"
          echo "REGION: $COS_REGION"
          test -n "$COS_SECRET_ID" || { echo "ERROR: TENCENT_COS_SECRET_ID is empty"; exit 1; }
          test -n "$COS_SECRET_KEY" || { echo "ERROR: TENCENT_COS_SECRET_KEY is empty"; exit 1; }
          test -n "$COS_BUCKET" || { echo "ERROR: TENCENT_COS_BUCKET is empty"; exit 1; }
          test -n "$COS_REGION" || { echo "ERROR: TENCENT_COS_REGION is empty"; exit 1; }
          echo ""
          echo "=== Configure coscmd ==="
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
          echo ""
          echo "=== List bucket root (verifies credentials before upload) ==="
          coscmd list / || { echo "!!! bucket access failed; credentials or permissions wrong"; exit 1; }
          echo ""
          echo "=== Upload ./cos-upload/ to build-artifacts/${BUILD_ID}/ ==="
          coscmd upload -r ./cos-upload/ "/build-artifacts/${BUILD_ID}/"
          echo ""
          echo "=== Verify uploaded objects ==="
          coscmd list "/build-artifacts/${BUILD_ID}/"

      - name: Notify agent-build (success)
        if: success()
        shell: bash
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "build_id": "${{ inputs.build_id }}",
            "run_id": ${{ github.run_id }},
            "status": "success",
            "artifact_storage": "cos",
            "cos_object_prefix": "build-artifacts/${{ inputs.build_id }}/",
            "files": ${{ steps.files.outputs.files }}
          }
          EOF
          )"

      - name: Notify agent-build (failure)
        if: failure()
        run: |
          curl -fsS -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_token }}" \
            -H "Content-Type: application/json" \
            -d "{\"build_id\":\"${{ inputs.build_id }}\",\"run_id\":${{ github.run_id }},\"status\":\"failed\"}"

      - name: Cleanup temp icon from repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ICON_SHA=$(gh api repos/${{ github.repository }}/contents/${{ inputs.icon_path }} --jq '.sha' 2>/dev/null || true)
          if [ -n "$ICON_SHA" ]; then
            gh api --method DELETE repos/${{ github.repository }}/contents/${{ inputs.icon_path }} \
              -f message="chore: cleanup build icon ${{ inputs.build_id }}" \
              -f sha="$ICON_SHA" \
              -f branch="${{ github.ref_name }}" || true
          fi
